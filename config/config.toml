[project]
name = "waddington"
version = "0.0.0"
seed = 1008

[data]
dataset =''
batch_size = 32
block_size = 256
num_workers = 4
input_cell_dim = 50

[model]
n_embd = 128
dropout = 0.1
hidden_dim=512
n_layers = 6
n_heads = 4
quantiles = [0.1, 0.5, 0.9]

[training]
lr = 5e-4
betas = [0.9, 0.96]
weight_decay = 0.01
gradient_clip =1.0
scheduler = 'cosine_with_restarts'
eval_interval = 500
save_interval =500
grad_accum_steps = 4
max_steps = 50000
epochs=6
warmup_steps = 1000
decay_steps = 1000

